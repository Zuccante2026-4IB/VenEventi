# =========================================================
# VenEventi - orchestrazione completa
# Avvio: docker compose up -d
# =========================================================

services:

  # ----- Database per Strapi --------------------------------
  strapiDB:
    image: mysql:8.0
    container_name: veneventi-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 5s
      retries: 10

  # ----- Strapi backend -------------------------------------
  strapi:
    build:
      context: ./Backend
    container_name: veneventi-strapi
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      HOST: ${HOST}
      PORT: ${PORT}
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_KEYS: ${APP_KEYS}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ADMIN_AUTH_SECRET: ${ADMIN_AUTH_SECRET}
      ADMIN_API_TOKEN_SALT: ${ADMIN_API_TOKEN_SALT}
      ADMIN_TRANSFER_TOKEN_SALT: ${ADMIN_TRANSFER_TOKEN_SALT}
      PUBLIC_URL: ${PUBLIC_URL}
    volumes:
      - ./Backend/config:/srv/app/config
      - ./Backend/src:/srv/app/src
      - ./Backend/package.json:/srv/app/package.json
      - strapi_uploads:/srv/app/public/uploads
    ports:
      - "1337:1337"
    networks:
      - backend
      - frontend
    depends_on:
      strapiDB:
        condition: service_healthy

  # ----- Cheshire Cat AI (agente "Kith") --------------------
  cheshire-cat:
    image: ghcr.io/cheshire-cat-ai/core:latest
    container_name: veneventi-cat
    restart: unless-stopped
    ports:
      - "${CCAT_PORT:-1865}:80"
      - "${CCAT_DEBUG_PORT:-5678}:5678"
    volumes:
      - ./AI-Agent/kith/static:/app/cat/static
      - ./AI-Agent/kith/plugins:/app/cat/plugins
      - ./AI-Agent/kith/data:/app/cat/data
    networks:
      - frontend

  # ----- Frontend statico (nginx) ---------------------------
  # Serve: static-HTML (root), Design (CSS/asset), Eventi (app JS), AI-Agent chat
  web:
    image: nginx:alpine
    container_name: veneventi-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static-HTML/html_semifinal:/srv/www/root:ro
      - ./Design:/srv/www/design:ro
      - ./Eventi:/srv/www/eventi:ro
      - ./AI-Agent/chatbot_chat:/srv/www/chat:ro
      - ./AI-Agent/chatbot_plugin:/srv/www/plugins-app:ro
    depends_on:
      - strapi
      - cheshire-cat
    networks:
      - frontend

volumes:
  db_data:
  strapi_uploads:

networks:
  backend:
  frontend:
