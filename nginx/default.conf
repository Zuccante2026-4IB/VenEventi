server {
    listen 80;
    server_name _;

    root /srv/www/root;
    index index.html;

    # Homepage e pagine statiche finali
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Asset di Design (CSS, immagini, screenshot)
    location /design/ {
        alias /srv/www/design/;
        autoindex on;
    }

    # Applicazione Eventi (frontend JS che parla con Strapi)
    location /eventi/ {
        alias /srv/www/eventi/;
        index index.html;
        try_files $uri $uri/ /eventi/index.html;
    }

    # Chat AI (Kith)
    location /chat/ {
        alias /srv/www/chat/;
        index chat.html;
    }

    # Plugin chatbot
    location /plugins-app/ {
        alias /srv/www/plugins-app/;
        index index.html;
    }

    # Proxy verso Strapi API
    location /api/ {
        proxy_pass http://strapi:1337/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy verso Cheshire Cat
    location /cat/ {
        proxy_pass http://cheshire-cat:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
